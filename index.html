<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>店內車輛維修紀錄系統 (密碼防護版)</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #18bc9c;
            --background-color: #ecf0f1;
            --text-color: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, "Microsoft JhengHei";
            background-color: var(--background-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 30px;
        }

        /* 密碼鎖介面 */
        #lockSection {
            max-width: 350px;
            margin: 100px auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            border-top: 5px solid var(--primary-color);
        }

        #lockSection input {
            width: 80%;
            padding: 10px;
            margin: 15px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1.1rem;
            text-align: center;
        }

        .btn-lock {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1rem;
            border-radius: 4px;
            cursor: pointer;
        }

        /* 表單樣式 */
        .repair-form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            background: #f8f9fa;
            padding: 20px;
            border-radius: 6px;
            margin-bottom: 30px;
            border-left: 5px solid var(--accent-color);
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-size: 0.9rem;
            font-weight: bold;
            margin-bottom: 5px;
            color: #555;
        }

        .form-group input, .form-group textarea {
            padding: 8px 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1rem;
        }

        .btn-submit {
            grid-column: 1 / -1;
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-submit:hover {
            background-color: #128f76;
        }

        /* 搜尋與統計區 */
        .dashboard {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
        }

        .search-box input {
            padding: 8px 12px;
            width: 250px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .action-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .btn-excel {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
        }

        .total-badge {
            background-color: var(--primary-color);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 1.1rem;
        }

        /* 表格樣式 */
        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th {
            background-color: var(--primary-color);
            color: white;
        }

        tr:hover {
            background-color: #f1f1f1;
        }

        .btn-delete {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 6px 10px;
            border-radius: 4px;
            cursor: pointer;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

<!-- 🔑 密碼鎖畫面 -->
<div id="lockSection">
    <h2>🛠️ 店內維修系統</h2>
    <p style="color: #7f8c8d; font-size: 0.9rem;">請輸入店用密碼以解鎖資料</p>
    <input type="password" id="passwordInput" placeholder="請輸入密碼">
    <br>
    <button class="btn-lock" onclick="checkPassword()">確認解鎖</button>
</div>

<!-- 🚗 主系統畫面 (預設隱藏) -->
<div id="mainSystem" class="container hidden">
    <div style="text-align: right;">
        <button class="btn-lock" style="background-color: #7f8c8d;" onclick="lockSystem()">🔒 上鎖並退出</button>
    </div>
    <h1>🚗 店內車輛維修紀錄系統</h1>

    <!-- 新增紀錄表單 -->
    <form id="repairForm" class="repair-form">
        <div class="form-group">
            <label for="carPlate">車牌號碼</label>
            <input type="text" id="carPlate" placeholder="例: ABC-1234" required>
        </div>
        <div class="form-group">
            <label for="carModel">車型</label>
            <input type="text" id="carModel" placeholder="例: Toyota Altis" required>
        </div>
        <div class="form-group">
            <label for="repairDate">維修日期</label>
            <input type="date" id="repairDate" required>
        </div>
        <div class="form-group">
            <label for="amount">維修金額 (元)</label>
            <input type="number" id="amount" placeholder="例: 5500" min="0" required>
        </div>
        <div class="form-group" style="grid-column: 1 / -1;">
            <label for="details">維修明細</label>
            <textarea id="details" rows="2" placeholder="請輸入維修項目..." required></textarea>
        </div>
        <button type="submit" class="btn-submit">新增維修紀錄</button>
    </form>

    <hr>

    <!-- 搜尋與總額顯示 -->
    <div class="dashboard">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="搜尋車牌、車型或明細...">
        </div>
        <div class="action-group">
            <button class="btn-excel" onclick="exportToCSV()">📊 匯出 Excel (CSV)</button>
            <div class="total-badge">
                目前累計金額：$<span id="totalAmount">0</span>
            </div>
        </div>
    </div>

    <!-- 紀錄列表 -->
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>日期</th>
                    <th>車牌號碼</th>
                    <th>車型</th>
                    <th>維修明細</th>
                    <th>金額 (NTD)</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="recordTableBody">
                <!-- 資料渲染區 -->
            </tbody>
        </table>
    </div>
</div>

<script>
    // ==========================================
    // 🔑 你的店用防護密碼（預設為 6324，可自行修改）
    // ==========================================
    const SHOP_PASSWORD = "6324"; 
    // ==========================================

    let repairRecords = JSON.parse(localStorage.getItem('repairRecords')) || [];
    document.getElementById('repairDate').valueAsDate = new Date();

    const repairForm = document.getElementById('repairForm');
    const recordTableBody = document.getElementById('recordTableBody');
    const totalAmountSpan = document.getElementById('totalAmount');
    const searchInput = document.getElementById('searchInput');

    // 檢查密碼
    function checkPassword() {
        const input = document.getElementById('passwordInput').value;
        if (input === SHOP_PASSWORD) {
            document.getElementById('lockSection').classList.add('hidden');
            document.getElementById('mainSystem').classList.remove('hidden');
            renderRecords();
        } else {
            alert('❌ 密碼錯誤！請重新輸入。');
        }
    }

    // 鎖定系統
    function lockSystem() {
        document.getElementById('passwordInput').value = '';
        document.getElementById('lockSection').classList.remove('hidden');
        document.getElementById('mainSystem').classList.add('hidden');
    }

    // 支援按 Enter 鍵解鎖
    document.getElementById('passwordInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            checkPassword();
        }
    });

    // 渲染表格與計算總金額
    function renderRecords(filterText = '') {
        recordTableBody.innerHTML = '';
        let total = 0;

        const filteredRecords = repairRecords.filter(record => {
            const text = filterText.toLowerCase();
            return record.plate.toLowerCase().includes(text) || 
                   record.model.toLowerCase().includes(text) || 
                   record.details.toLowerCase().includes(text);
        });

        filteredRecords.forEach((record) => {
            total += parseInt(record.amount);
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${record.date}</td>
                <td><strong>${record.plate.toUpperCase()}</strong></td>
                <td>${record.model}</td>
                <td>${record.details.replace(/\n/g, '<br>')}</td>
                <td>$${parseInt(record.amount).toLocaleString()}</td>
                <td>
                    <button class="btn-delete" onclick="deleteRecord(${record.id})">刪除</button>
                </td>
            `;
            recordTableBody.appendChild(row);
        });

        totalAmountSpan.textContent = total.toLocaleString();
    }

    // 新增紀錄
    repairForm.addEventListener('submit', function(e) {
        e.preventDefault();
        const newRecord = {
            id: Date.now(),
            plate: document.getElementById('carPlate').value,
            model: document.getElementById('carModel').value,
            date: document.getElementById('repairDate').value,
            amount: document.getElementById('amount').value,
            details: document.getElementById('details').value
        };
        repairRecords.unshift(newRecord);
        saveToLocalStorage();
        renderRecords();
        const currentDate = document.getElementById('repairDate').value;
        repairForm.reset();
        document.getElementById('repairDate').value = currentDate;
    });

    // 刪除紀錄
    window.deleteRecord = function(id) {
        if(confirm('確定要刪除這筆紀錄嗎？')) {
            repairRecords = repairRecords.filter(record => record.id !== id);
            saveToLocalStorage();
            renderRecords(searchInput.value);
        }
    }

    // 匯出 Excel 功能 (CSV)
    window.exportToCSV = function() {
        if (repairRecords.length === 0) {
            alert('目前沒有資料可以匯出唷！');
            return;
        }
        let csvContent = "\uFEFF" + "日期,車牌號碼,車型,維修明細,金額(元)\n";
        repairRecords.forEach(record => {
            let cleanDetails = record.details.replace(/"/g, '""');
            csvContent += `${record.date},"${record.plate.toUpperCase()}","${record.model}","${cleanDetails}",${record.amount}\n`;
        });
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.setAttribute("href", url);
        link.setAttribute("download", `車輛維修紀錄_${new Date().toISOString().slice(0,10)}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    searchInput.addEventListener('input', function() {
        renderRecords(this.value);
    });

    function saveToLocalStorage() {
        localStorage.setItem('repairRecords', JSON.stringify(repairRecords));
    }
</script>

</body>
</html>
