<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>專業車務維修紀錄與利潤統計系統</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #18bc9c;
            --danger-color: #e74c3c;
            --warning-color: #f39c12;
            --success-color: #27ae60;
            --background-color: #ecf0f1;
            --text-color: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, "Microsoft JhengHei";
            background-color: var(--background-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 20px;
        }

        /* 密碼鎖介面 */
        #lockSection {
            max-width: 350px;
            margin: 100px auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            border-top: 5px solid var(--primary-color);
        }

        #lockSection input {
            width: 80%;
            padding: 10px;
            margin: 15px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1.1rem;
            text-align: center;
        }

        .btn-lock {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1rem;
            border-radius: 4px;
            cursor: pointer;
        }

        /* 表單與欄位設計 */
        .repair-form {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 6px;
            margin-bottom: 30px;
            border-left: 5px solid var(--accent-color);
        }

        .form-grid-basic {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-size: 0.85rem;
            font-weight: bold;
            margin-bottom: 5px;
            color: #555;
        }

        .form-group input {
            padding: 8px 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 0.95rem;
        }

        /* 動態零件清單區 */
        .items-section {
            background: #ffffff;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .items-section h3 {
            margin-top: 0;
            margin-bottom: 15px;
            color: var(--primary-color);
            font-size: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .item-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1.2fr 1.2fr auto;
            gap: 10px;
            align-items: center;
            margin-bottom: 10px;
        }

        .item-row input {
            padding: 6px 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 0.9rem;
        }

        .btn-add-item {
            background-color: #34495e;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .btn-remove-item {
            background-color: var(--danger-color);
            color: white;
            border: none;
            padding: 6px 10px;
            border-radius: 4px;
            cursor: pointer;
        }

        .btn-submit {
            width: 100%;
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-submit:hover {
            background-color: #128f76;
        }

        /* 統計面版樣式 */
        .stats-dashboard {
            margin-bottom: 30px;
        }

        .stats-dashboard h2 {
            font-size: 1.2rem;
            color: var(--primary-color);
            margin-bottom: 15px;
            border-bottom: 2px solid #ddd;
            padding-bottom: 5px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
        }

        .stats-card {
            background: #f8f9fa;
            border-radius: 6px;
            padding: 15px;
            border-left: 5px solid var(--primary-color);
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .stats-card.day { border-left-color: #3498db; }
        .stats-card.week { border-left-color: #9b59b6; }
        .stats-card.month { border-left-color: #27ae60; }
        .stats-card.quarter { border-left-color: #e67e22; }

        .stats-card h3 {
            margin: 0 0 10px 0;
            font-size: 1rem;
            color: #555;
        }

        .stats-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }

        .stats-row span.label {
            color: #7f8c8d;
        }

        .stats-row span.val {
            font-weight: bold;
        }

        .stats-row.profit span.val {
            color: var(--success-color);
        }

        /* 搜尋與過濾 */
        .dashboard {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
        }

        .search-box input {
            padding: 8px 12px;
            width: 300px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .btn-excel {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
        }

        /* 表格與明細展開 */
        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            font-size: 0.9rem;
        }

        th, td {
            padding: 10px 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th {
            background-color: var(--primary-color);
            color: white;
        }

        .details-badge {
            display: inline-block;
            background: #ebf5fb;
            color: #2980b9;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.8rem;
            margin-top: 3px;
        }

        .btn-delete {
            background-color: var(--danger-color);
            color: white;
            border: none;
            padding: 5px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .profit-text {
            color: var(--success-color);
            font-weight: bold;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

<!-- 🔑 密碼鎖畫面 -->
<div id="lockSection">
    <h2>🛠️ 店內維修與財務管理系統</h2>
    <p style="color: #7f8c8d; font-size: 0.9rem;">請輸入店用密碼解鎖</p>
    <input type="password" id="passwordInput" placeholder="請輸入密碼">
    <br>
    <button class="btn-lock" onclick="checkPassword()">確認解鎖</button>
</div>

<!-- 🚗 主系統畫面 (預設隱藏) -->
<div id="mainSystem" class="container hidden">
    <div style="text-align: right;">
        <button class="btn-lock" style="background-color: #7f8c8d; padding: 6px 12px; font-size: 0.85rem;" onclick="lockSystem()">🔒 上鎖並退出</button>
    </div>
    <h1>🚗 店內車輛維修紀錄系統</h1>

    <!-- 新增紀錄表單 -->
    <form id="repairForm" class="repair-form">
        <div class="form-grid-basic">
            <div class="form-group">
                <label for="carPlate">車牌號碼 *</label>
                <input type="text" id="carPlate" placeholder="例: ABC-1234" required>
            </div>
            <div class="form-group">
                <label for="carModel">車型 *</label>
                <input type="text" id="carModel" placeholder="例: CYGNUS Gryphus" required>
            </div>
            <div class="form-group">
                <label for="ownerPhone">車主行動電話</label>
                <input type="tel" id="ownerPhone" placeholder="例: 0912345678">
            </div>
            <div class="form-group">
                <label for="lineId">LINE ID</label>
                <input type="text" id="lineId" placeholder="輸入LINE ID">
            </div>
            <div class="form-group">
                <label for="mileage">里程數 (km) *</label>
                <input type="number" id="mileage" placeholder="目前里程" min="0" required>
            </div>
            <div class="form-group">
                <label for="repairDate">維修日期 *</label>
                <input type="date" id="repairDate" required>
            </div>
            <div class="form-group">
                <label for="inspectDate">下次驗車時間 (選填)</label>
                <input type="date" id="inspectDate">
            </div>
        </div>

        <!-- 🔧 維修項目明細 (可動態新增多筆) -->
        <div class="items-section">
            <h3>
                <span>🛠️ 維修與零件明細 (成本利潤計算)</span>
                <button type="button" class="btn-add-item" onclick="addItemRow()">➕ 新增項目</button>
            </h3>
            <div id="itemsContainer">
                <!-- 第一行預設列 -->
                <div class="item-row">
                    <input type="text" placeholder="維修名稱/零件 (如: 火星塞)" required class="item-name">
                    <input type="number" placeholder="數量" value="1" min="1" required class="item-qty" oninput="calculateRowTotals()">
                    <input type="number" placeholder="單件售價" min="0" required class="item-price" oninput="calculateRowTotals()">
                    <input type="number" placeholder="單件成本 (0 = 純工資)" value="0" min="0" required class="item-cost" oninput="calculateRowTotals()">
                    <button type="button" class="btn-remove-item" onclick="removeItemRow(this)">✖</button>
                </div>
            </div>
            <div style="text-align: right; margin-top: 10px; font-size: 0.9rem; font-weight: bold; color: #555;">
                本單預估： 總收 $<span id="formTotalRev">0</span> | 總成本 $<span id="formTotalCost">0</span> | 淨利潤 <span style="color:var(--success-color)">$<span id="formTotalProfit">0</span></span>
            </div>
        </div>

        <button type="submit" class="btn-submit">💾 儲存並新增此筆維修紀錄</button>
    </form>

    <hr>

    <!-- 📊 營收與利潤統計面板 -->
    <div class="stats-dashboard">
        <h2>📊 財務營業額與利潤統計面板</h2>
        <div class="stats-grid">
            <!-- 今日 -->
            <div class="stats-card day">
                <h3>📅 今日統計 (<span id="statDayLabel">--</span>)</h3>
                <div class="stats-row"><span class="label">營業額:</span><span class="val" id="dayRev">$0</span></div>
                <div class="stats-row"><span class="label">總成本:</span><span class="val" id="dayCost">$0</span></div>
                <div class="stats-row profit"><span class="label">淨利潤:</span><span class="val" id="dayProfit">$0</span></div>
            </div>
            <!-- 本週 -->
            <div class="stats-card week">
                <h3>🗓️ 本週統計 (週一~週日)</h3>
                <div class="stats-row"><span class="label">營業額:</span><span class="val" id="weekRev">$0</span></div>
                <div class="stats-row"><span class="label">總成本:</span><span class="val" id="weekCost">$0</span></div>
                <div class="stats-row profit"><span class="label">淨利潤:</span><span class="val" id="weekProfit">$0</span></div>
            </div>
            <!-- 本月 -->
            <div class="stats-card month">
                <h3>📅 本月統計 (<span id="statMonthLabel">--</span>)</h3>
                <div class="stats-row"><span class="label">營業額:</span><span class="val" id="monthRev">$0</span></div>
                <div class="stats-row"><span class="label">總成本:</span><span class="val" id="monthCost">$0</span></div>
                <div class="stats-row profit"><span class="label">淨利潤:</span><span class="val" id="monthProfit">$0</span></div>
            </div>
            <!-- 本季 -->
            <div class="stats-card quarter">
                <h3>🏆 本季統計 (當季)</h3>
                <div class="stats-row"><span class="label">營業額:</span><span class="val" id="quarterRev">$0</span></div>
                <div class="stats-row"><span class="label">總成本:</span><span class="val" id="quarterCost">$0</span></div>
                <div class="stats-row profit"><span class="label">淨利潤:</span><span class="val" id="quarterProfit">$0</span></div>
            </div>
        </div>
    </div>

    <!-- 搜尋與匯出 -->
    <div class="dashboard">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="搜尋車牌、車型、電話、LINE 或零件明細...">
        </div>
        <button class="btn-excel" onclick="exportToCSV()">📊 匯出完整 Excel (CSV)</button>
    </div>

    <!-- 紀錄列表 -->
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>維修日期</th>
                    <th>基本車務資料</th>
                    <th>車主聯絡方式</th>
                    <th>維修與材料明細</th>
                    <th>財務小計</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="recordTableBody">
                <!-- 由 JavaScript 渲染 -->
            </tbody>
        </table>
    </div>
</div>

<script>
    // ==========================================
    // 🔑 店用安全密碼
    // ==========================================
    const SHOP_PASSWORD = "8888"; 
    // ==========================================

    let repairRecords = JSON.parse(localStorage.getItem('proRepairRecords')) || [];
    document.getElementById('repairDate').valueAsDate = new Date();

    const repairForm = document.getElementById('repairForm');
    const itemsContainer = document.getElementById('itemsContainer');
    const recordTableBody = document.getElementById('recordTableBody');
    const searchInput = document.getElementById('searchInput');

    // 檢查密碼
    function checkPassword() {
        const input = document.getElementById('passwordInput').value;
        if (input === SHOP_PASSWORD) {
            document.getElementById('lockSection').classList.add('hidden');
            document.getElementById('mainSystem').classList.remove('hidden');
            renderRecords();
        } else {
            alert('❌ 密碼錯誤！');
        }
    }

    // 密碼鎖定
    function lockSystem() {
        document.getElementById('passwordInput').value = '';
        document.getElementById('lockSection').classList.remove('hidden');
        document.getElementById('mainSystem').classList.add('hidden');
    }

    document.getElementById('passwordInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') checkPassword();
    });

    // 動態新增零件列
    window.addItemRow = function() {
        const row = document.createElement('div');
        row.className = 'item-row';
        row.innerHTML = `
            <input type="text" placeholder="維修名稱/零件" required class="item-name">
            <input type="number" placeholder="數量" value="1" min="1" required class="item-qty" oninput="calculateRowTotals()">
            <input type="number" placeholder="單件售價" min="0" required class="item-price" oninput="calculateRowTotals()">
            <input type="number" placeholder="單件成本 (0 = 純工資)" value="0" min="0" required class="item-cost" oninput="calculateRowTotals()">
            <button type="button" class="btn-remove-item" onclick="removeItemRow(this)">✖</button>
        `;
        itemsContainer.appendChild(row);
        calculateRowTotals();
    }

    // 移除零件列
    window.removeItemRow = function(btn) {
        const rows = itemsContainer.getElementsByClassName('item-row');
        if (rows.length > 1) {
            btn.parentElement.remove();
            calculateRowTotals();
        } else {
            alert('最少必須填寫一項維修或零件項目！');
        }
    }

    // 計算當前填寫表單的總收、總成本、淨利潤
    window.calculateRowTotals = function() {
        let formTotalRev = 0;
        let formTotalCost = 0;

        const rows = itemsContainer.getElementsByClassName('item-row');
        for (let row of rows) {
            const qty = parseInt(row.querySelector('.item-qty').value) || 0;
            const price = parseInt(row.querySelector('.item-price').value) || 0;
            const cost = parseInt(row.querySelector('.item-cost').value) || 0;

            formTotalRev += qty * price;
            formTotalCost += qty * cost;
        }

        document.getElementById('formTotalRev').textContent = formTotalRev.toLocaleString();
        document.getElementById('formTotalCost').textContent = formTotalCost.toLocaleString();
        document.getElementById('formTotalProfit').textContent = (formTotalRev - formTotalCost).toLocaleString();
    }

    // 計算時間區間財務統計
    function calculateFinanceDashboard() {
        const today = new Date();
        const todayStr = today.toISOString().slice(0, 10);
        
        // 顯示標題日期
        document.getElementById('statDayLabel').textContent = todayStr.substring(5, 10);
        document.getElementById('statMonthLabel').textContent = todayStr.substring(0, 7);

        // 週統計的範圍計算（週一至週日）
        const currentDay = today.getDay(); 
        const distanceToMonday = currentDay === 0 ? 6 : currentDay - 1; 
        const monday = new Date(today);
        monday.setDate(today.getDate() - distanceToMonday);
        monday.setHours(0,0,0,0);
        
        const sunday = new Date(monday);
        sunday.setDate(monday.getDate() + 6);
        sunday.setHours(23,59,59,999);

        // 各區間累計容器
        let dRev = 0, dCost = 0;
        let wRev = 0, wCost = 0;
        let mRev = 0, mCost = 0;
        let qRev = 0, qCost = 0;

        const currentYear = today.getFullYear();
        const currentMonth = today.getMonth() + 1; // 1-12
        const currentQuarter = Math.ceil(currentMonth / 3); // 1-4

        repairRecords.forEach(record => {
            const rDateStr = record.date; // YYYY-MM-DD
            if(!rDateStr) return;

            const rDate = new Date(rDateStr);
            const rYear = rDate.getFullYear();
            const rMonth = rDate.getMonth() + 1;
            const rQuarter = Math.ceil(rMonth / 3);

            const rev = parseInt(record.totalRev) || 0;
            const cost = parseInt(record.totalCost) || 0;

            // 1. 日統計
            if (rDateStr === todayStr) {
                dRev += rev;
                dCost += cost;
            }

            // 2. 週統計
            if (rDate >= monday && rDate <= sunday) {
                wRev += rev;
                wCost += cost;
            }

            // 3. 月統計
            if (rYear === currentYear && rMonth === currentMonth) {
                mRev += rev;
                mCost += cost;
            }

            // 4. 季統計
            if (rYear === currentYear && rQuarter === currentQuarter) {
                qRev += rev;
                qCost += cost;
            }
        });

        // 渲染統計卡片
        document.getElementById('dayRev').textContent = `$${dRev.toLocaleString()}`;
        document.getElementById('dayCost').textContent = `$${dCost.toLocaleString()}`;
        document.getElementById('dayProfit').textContent = `$${(dRev - dCost).toLocaleString()}`;

        document.getElementById('weekRev').textContent = `$${wRev.toLocaleString()}`;
        document.getElementById('weekCost').textContent = `$${wCost.toLocaleString()}`;
        document.getElementById('weekProfit').textContent = `$${(wRev - wCost).toLocaleString()}`;

        document.getElementById('monthRev').textContent = `$${mRev.toLocaleString()}`;
        document.getElementById('monthCost').textContent = `$${mCost.toLocaleString()}`;
        document.getElementById('monthProfit').textContent = `$${(mRev - mCost).toLocaleString()}`;

        document.getElementById('quarterRev').textContent = `$${qRev.toLocaleString()}`;
        document.getElementById('quarterCost').textContent = `$${qCost.toLocaleString()}`;
        document.getElementById('quarterProfit').textContent = `$${(qRev - qCost).toLocaleString()}`;
    }

    // 渲染表格
    function renderRecords(filterText = '') {
        recordTableBody.innerHTML = '';

        const filteredRecords = repairRecords.filter(record => {
            const text = filterText.toLowerCase();
            
            // 搜尋範圍：車牌、車型、手機、LINE ID、或者零件名稱
            const matchBasic = record.plate.toLowerCase().includes(text) || 
                               record.model.toLowerCase().includes(text) || 
                               record.phone.toLowerCase().includes(text) || 
                               record.lineId.toLowerCase().includes(text);
            
            const matchItems = record.items.some(item => item.name.toLowerCase().includes(text));
            
            return matchBasic || matchItems;
        });

        if (filteredRecords.length === 0) {
            recordTableBody.innerHTML = `<tr><td colspan="6" style="text-align:center; color:#7f8c8d;">查無符合的維修紀錄</td></tr>`;
            return;
        }

        filteredRecords.forEach((record) => {
            // 組合維修明細字串
            let itemsHTML = record.items.map(item => {
                return `• ${item.name} x${item.qty} ($${parseInt(item.price).toLocaleString()})`;
            }).join('<br>');

            // 驗車提醒字樣
            let inspectAlert = '';
            if (record.inspectDate) {
                inspectAlert = `<br><span style="color:var(--warning-color); font-weight:bold; font-size:0.8rem;">🔍 下次驗車: ${record.inspectDate}</span>`;
            }

            const row = document.createElement('tr');
            row.innerHTML = `
                <td><strong>${record.date}</strong></td>
                <td>
                    車牌: <strong>${record.plate.toUpperCase()}</strong><br>
                    車型: ${record.model}<br>
                    里程: <span style="color:#2980b9; font-weight:bold;">${parseInt(record.mileage).toLocaleString()} km</span>
                </td>
                <td>
                    手機: ${record.phone || '無'}<br>
                    LINE: ${record.lineId || '無'}
                    ${inspectAlert}
                </td>
                <td>
                    <div style="max-height:100px; overflow-y:auto; line-height:1.4;">
                        ${itemsHTML}
                    </div>
                </td>
                <td>
                    實收: $${parseInt(record.totalRev).toLocaleString()}<br>
                    成本: $${parseInt(record.totalCost).toLocaleString()}<br>
                    淨利: <span class="profit-text">$${(record.totalRev - record.totalCost).toLocaleString()}</span>
                </td>
                <td>
                    <button class="btn-delete" onclick="deleteRecord(${record.id})">刪除</button>
                </td>
            `;
            recordTableBody.appendChild(row);
        });

        // 重算四大財務統計
        calculateFinanceDashboard();
    }

    // 新增維修表單送出
    repairForm.addEventListener('submit', function(e) {
        e.preventDefault();

        // 整理零件明細
        const items = [];
        let totalRev = 0;
        let totalCost = 0;

        const rows = itemsContainer.getElementsByClassName('item-row');
        for (let row of rows) {
            const name = row.querySelector('.item-name').value;
            const qty = parseInt(row.querySelector('.item-qty').value) || 0;
            const price = parseInt(row.querySelector('.item-price').value) || 0;
            const cost = parseInt(row.querySelector('.item-cost').value) || 0;

            items.push({ name, qty, price, cost });
            totalRev += qty * price;
            totalCost += qty * cost;
        }

        const newRecord = {
            id: Date.now(),
            plate: document.getElementById('carPlate').value,
            model: document.getElementById('carModel').value,
            phone: document.getElementById('ownerPhone').value,
            lineId: document.getElementById('lineId').value,
            mileage: document.getElementById('mileage').value,
            date: document.getElementById('repairDate').value,
            inspectDate: document.getElementById('inspectDate').value,
            items: items,
            totalRev: totalRev,
            totalCost: totalCost
        };

        repairRecords.unshift(newRecord);
        saveToLocalStorage();
        renderRecords();

        // 重置表單並保留今天日期
        const currentDate = document.getElementById('repairDate').value;
        repairForm.reset();
        document.getElementById('repairDate').value = currentDate;
        
        // 重置動態零件清單，保留第一行
        itemsContainer.innerHTML = `
            <div class="item-row">
                <input type="text" placeholder="維修名稱/零件" required class="item-name">
                <input type="number" placeholder="數量" value="1" min="1" required class="item-qty" oninput="calculateRowTotals()">
                <input type="number" placeholder="單件售價" min="0" required class="item-price" oninput="calculateRowTotals()">
                <input type="number" placeholder="單件成本 (0 = 純工資)" value="0" min="0" required class="item-cost" oninput="calculateRowTotals()">
                <button type="button" class="btn-remove-item" onclick="removeItemRow(this)">✖</button>
            </div>
        `;
        calculateRowTotals();
    });

    // 刪除維修紀錄
    window.deleteRecord = function(id) {
        if (confirm('確定要刪除這筆紀錄嗎？這會同步扣除財務統計金額！')) {
            repairRecords = repairRecords.filter(rec => rec.id !== id);
            saveToLocalStorage();
            renderRecords(searchInput.value);
        }
    }

    // 匯出 CSV (Excel 可開，加入 BOM 避免中文亂碼)
    window.exportToCSV = function() {
        if (repairRecords.length === 0) {
            alert('目前沒有資料可以匯出唷！');
            return;
        }

        let csvContent = "\uFEFF"; // BOM 擋亂碼
        csvContent += "維修日期,車牌號碼,車型,里程數,車主電話,LINE ID,下次驗車日期,零件與維修明細,總實收(營業額),總材料成本,總淨利潤\n";

        repairRecords.forEach(rec => {
            // 將明細轉換成單行好閱讀的字串
            let itemsString = rec.items.map(item => `${item.name}*${item.qty}($${item.price}/成本$${item.cost})`).join(' | ');
            let profit = rec.totalRev - rec.totalCost;
            
            csvContent += `"${rec.date}","${rec.plate.toUpperCase()}","${rec.model}","${rec.mileage}","${rec.phone}","${rec.lineId}","${rec.inspectDate}","${itemsString}",${rec.totalRev},${rec.totalCost},${profit}\n`;
        });

        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.setAttribute("href", url);
        link.setAttribute("download", `車行營收與利潤分析表_${new Date().toISOString().slice(0,10)}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    // 即時搜尋
    searchInput.addEventListener('input', function() {
        renderRecords(this.value);
    });

    function saveToLocalStorage() {
        localStorage.setItem('proRepairRecords', JSON.stringify(repairRecords));
    }
</script>

</body>
</html>
